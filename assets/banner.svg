<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Miss Dantella">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e49cb2"/>
      <stop offset="1" stop-color="#c98aae"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.14" cy="0.5" r="0.9">
      <stop offset="0" stop-color="#e49cb2" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#e49cb2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="360" fill="#0e0a0d"/>
  <rect width="1200" height="360" fill="url(#glow)"/>
  <!-- hairline frame -->
  <rect x="0.5" y="0.5" width="1199" height="359" fill="none" stroke="#f4eef0" stroke-opacity="0.06"/>
  <!-- accent dot-mark (echoes the live favicon) -->
  <circle cx="104" cy="96" r="9" fill="url(#accent)"/>
  <!-- eyebrow -->
  <text x="126" y="102" font-family="'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif" font-size="17" font-weight="600" letter-spacing="2.5" fill="#a794a0">A DAHHAN ENTERPRISES BRAND</text>
  <!-- wordmark -->
  <text x="96" y="218.56" font-family="'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif" font-size="84" font-weight="400" letter-spacing="0.2" fill="#f4eef0">Miss Dantella</text>
  <!-- accent underline -->
  <rect x="96" y="234" width="132" height="5" rx="2.5" fill="url(#accent)"/>
  <!-- tagline -->
  <text x="96" y="282" font-family="'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif" font-size="26" font-weight="400" fill="#a794a0">A house of lace, lingerie and elastic.</text>
</svg>
